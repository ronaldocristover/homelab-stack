services:
  mysql-backup:
    build: .
    container_name: mysql-backup
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVERS_FILE=/config/servers.json
      - DB_CLEANUP=${DB_CLEANUP:-true}
      - CLEANUP_TIME=${CLEANUP_TIME:-604800}
      - TZ=${TZ:-UTC}
      - DO_ACCESS_KEY=${DO_ACCESS_KEY:-}
      - DO_SECRET_KEY=${DO_SECRET_KEY:-}
      - DO_ENDPOINT=${DO_ENDPOINT:-nyc3.digitaloceanspaces.com}
      - DO_REGION=${DO_REGION:-nyc3}
      - DO_BUCKET=${DO_BUCKET:-}
      - DO_PATH=${DO_PATH:-mysql}
      - DO_CLEANUP=${DO_CLEANUP:-true}
      - DO_CLEANUP_DAYS=${DO_CLEANUP_DAYS:-30}
      - LOCAL_BACKUP_ENABLED=${LOCAL_BACKUP_ENABLED:-false}
      - LOCAL_CLEANUP=${LOCAL_CLEANUP:-true}
      - LOCAL_CLEANUP_DAYS=${LOCAL_CLEANUP_DAYS:-90}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_HOSTNAME=${ALERT_HOSTNAME:-}
      - GIF_URL_SUCCESS=${GIF_URL_SUCCESS:-}
      - GIF_URL_WARNING=${GIF_URL_WARNING:-}
      - GIF_URL_FAILURE=${GIF_URL_FAILURE:-}
    volumes:
      - ${HDD_MOUNT_PATH:-./backups-hdd}:/backups-hdd
      - ./servers.json:/config/servers.json:ro
    networks:
      - mysql-network

networks:
  mysql-network:
    driver: bridge
