services:
    minio:
        image: minio/minio:latest
        container_name: minio
        restart: unless-stopped
        ports:
            - "${MINIO_API_PORT:-9003}:9000"
            - "${MINIO_CONSOLE_PORT:-9001}:9001"
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        volumes:
            - ${MINIO_DATA_DIR1}:/data
            - ${MINIO_DATA_DIR2}:/data2
        command: server /data /data2 --console-address ":9001"
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 30s
            timeout: 20s
            retries: 3
            start_period: 15s
        networks:
            - minio_network
            - global-network

    minio-init:
        image: minio/mc:latest
        container_name: minio-init
        depends_on:
            minio:
                condition: service_healthy
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            - MINIO_API_PORT=${MINIO_API_PORT:-9003}
        volumes:
            - ./scripts:/scripts
        entrypoint: /bin/sh
        command: -c "sleep 5 && /scripts/create-buckets.sh"
        networks:
            - minio_network
            - global-network

networks:
    minio_network:
        driver: bridge
    global-network:
        external: true
