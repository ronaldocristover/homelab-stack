version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"    # MinIO API port
      - "9001:9001"    # MinIO Console (Web UI) port
      - "9002:9002"    # MinIO Browser port
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}
      - MINIO_BROWSER_PORT=${MINIO_BROWSER_PORT}
    volumes:
      - minio_data1:/data
      - minio_data2:/data2
    command: server /data /data2 --console-address ":${MINIO_CONSOLE_PORT}" --browser-address ":${MINIO_BROWSER_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - minio_network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    entrypoint: /bin/sh
    command: -c "sleep 5 && /scripts/create-buckets.sh"
    networks:
      - minio_network

volumes:
  minio_data1:
  minio_data2:

networks:
  minio_network:
    driver: bridge